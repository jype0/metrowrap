name: CI
permissions:
  contents: read

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -------------------------------------------------------------------------
  # Unit tests — pure Rust, no external toolchain needed.
  # Runs on every push and PR across all three platforms.
  # -------------------------------------------------------------------------
  unit-test:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          #- macos-latest
          #- windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
          components: rustfmt, clippy

      - name: Install clang + lld (Linux only — required by Cargo.toml linker config)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y clang lld binutils-mipsel-linux-gnu

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Run unit tests
        run: make test-unit VERBOSE=1

  # -------------------------------------------------------------------------
  # Integration tests — requires mwccpsp.exe, wibo, and allegrex-as.
  # Only runs on Linux (the binaries are Linux x86_64 ELFs / wibo wraps the
  # Windows .exe).  The toolchain download is cached by its version URL so
  # it only re-downloads when the Makefile's URLs change.
  # -------------------------------------------------------------------------
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"

      - name: Install system dependencies
        run: sudo apt-get install -y clang lld binutils-mipsel-linux-gnu

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache private toolchain binaries
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: target/.private/bin
          # Key includes the URLs embedded in the Makefile so the cache
          # is invalidated if the download URLs ever change.
          key: toolchain-${{ runner.os }}-wibo-0.6.13-mwcc-219

      - name: Download toolchain (if not cached)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: make dependencies

      - name: Run integration tests
        run: make test-integration VERBOSE=1
